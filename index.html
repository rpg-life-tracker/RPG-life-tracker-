<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Campaign">
<meta name="theme-color" content="#0f0e0c">
<title>The 90-Day Campaign</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#0f0e0c;color:#d4c5a9;font-family:Georgia,serif;min-height:100vh;-webkit-font-smoothing:antialiased}
body{padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);background-image:radial-gradient(ellipse at top,rgba(201,169,97,0.06),transparent 60%)}
.root{padding:20px 14px 60px;max-width:720px;margin:0 auto}
.header{text-align:center;padding-bottom:20px;border-bottom:1px solid #3a3530;margin-bottom:20px}
.title{font-size:24px;color:#e8d9b8;font-style:italic;margin-bottom:4px}
.subtitle{font-size:10px;color:#8a7a5c;letter-spacing:0.3em;text-transform:uppercase}
.saved{position:fixed;top:calc(env(safe-area-inset-top) + 8px);right:12px;font-size:10px;color:#7fa87f;letter-spacing:0.2em;text-transform:uppercase;opacity:0;transition:opacity 0.3s;font-style:italic;z-index:100}
.saved.show{opacity:1}
.tabs{display:flex;gap:4px;margin-bottom:24px;overflow-x:auto;border-bottom:1px solid #2a2621}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 12px;background:transparent;border:none;border-bottom:2px solid transparent;color:#6d6553;font-family:inherit;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;cursor:pointer;white-space:nowrap}
.tab.active{color:#e8d9b8;border-bottom:2px solid #c9a961}
.banner{display:flex;gap:16px;margin-bottom:20px;padding:16px 18px;background:#17150f;border:1px solid #3a3530;align-items:center}
.lv{text-align:center;border-right:1px solid #3a3530;padding-right:16px}
.lv-lbl{font-size:9px;letter-spacing:0.3em;color:#8a7a5c}
.lv-n{font-size:28px;color:#e8d9b8}
.bm{flex:1}
.ph-lbl{font-size:10px;letter-spacing:0.25em;margin-bottom:4px}
.ph-d{font-size:12px;color:#a89a7f;font-style:italic;margin-bottom:10px}
.xpb{height:4px;background:#2a2621;border:1px solid #3a3530;overflow:hidden}
.dn{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#17150f;border:1px solid #3a3530;margin-bottom:20px}
.dnb{background:transparent;border:1px solid #3a3530;color:#c9a961;padding:6px 14px;font-family:inherit;font-size:18px;cursor:pointer}
.dnb:disabled{opacity:0.3}
.dnc{text-align:center;flex:1}
.dn-lbl{font-size:9px;letter-spacing:0.3em;color:#8a7a5c}
.dn-n{font-size:22px;color:#e8d9b8}
.dn-t{font-size:13px;color:#6d6553}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:24px}
.stat{background:#17150f;border:1px solid #3a3530;padding:10px 6px;text-align:center}
.stat-v{font-size:18px;color:#e8d9b8}
.stat-l{font-size:8px;letter-spacing:0.2em;color:#6d6553;margin-top:2px}
.sec{margin-bottom:28px}
.sh{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #2a2621}
.st{font-size:11px;letter-spacing:0.3em;color:#c9a961}
.sm{font-size:10px;color:#8a7a5c;font-style:italic}
.ql{display:flex;flex-direction:column;gap:4px}
.qr{width:100%;display:flex;align-items:center;gap:12px;padding:12px 14px;background:#17150f;border:1px solid #2a2621;cursor:pointer;color:#d4c5a9;font-family:inherit;font-size:14px;text-align:left}
.qc{width:18px;height:18px;border:1.5px solid #4a4438;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.qr.done .qc-chk{color:#0f0e0c;font-weight:900;font-size:14px}
.qc-chk{display:none}
.qr.done .qc-chk{display:block}
.ql-lbl{flex:1;font-size:13px;line-height:1.3}
.qr.done .ql-lbl{opacity:0.7;text-decoration:line-through}
.qxp{font-size:10px;letter-spacing:0.1em;font-weight:600;color:#6d6553}
.dg{display:grid;grid-template-columns:repeat(10,1fr);gap:3px;margin-bottom:12px}
.dc{aspect-ratio:1;font-size:10px;font-family:inherit;cursor:pointer;padding:0;border:1px solid #2a2621;background:#17150f;color:#8a7a5c}
.dc.cur{border:1.5px solid #e8d9b8}
.dc.cmp{color:#0f0e0c;font-weight:700}
.dc.par{background:#28241e}
.lg{display:flex;gap:14px;font-size:9px;color:#6d6553;letter-spacing:0.15em;text-transform:uppercase}
.lg i{display:flex;align-items:center;gap:5px;font-style:normal}
.lg span{width:7px;height:7px;display:inline-block}
.ti{padding:16px 0 20px;border-bottom:1px solid #2a2621;margin-bottom:24px}
.tit{font-size:14px;letter-spacing:0.3em;color:#c9a961;margin-bottom:10px}
.tid{font-size:13px;color:#a89a7f;line-height:1.6;font-style:italic}
.tis{margin-top:10px;font-size:11px;letter-spacing:0.2em;text-transform:uppercase}
.ic{background:#17150f;border:1px solid #2a2621;border-left:2px solid #c9a961;padding:12px 14px;margin-bottom:10px}
.ict{font-size:10px;letter-spacing:0.25em;color:#c9a961;margin-bottom:6px}
.icd{font-size:13px;color:#d4c5a9;line-height:1.6}
.qd{background:#17150f;border:1px solid #2a2621;padding:14px 16px;margin-bottom:10px}
.qdh{display:flex;align-items:center;gap:8px;padding-bottom:8px;margin-bottom:8px;border-bottom:1px solid}
.qdp{font-size:10px;letter-spacing:0.25em}
.qdt{font-size:14px;color:#e8d9b8;margin-bottom:8px;font-style:italic}
.qdd{font-size:12.5px;color:#a89a7f;line-height:1.6}
.pc{background:#17150f;border:1px solid #2a2621;padding:16px 18px;margin-bottom:14px}
.pch{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px}
.pcl{font-size:10px;letter-spacing:0.3em}
.pcn{font-size:20px;color:#e8d9b8}
.pcd{font-size:11px;color:#8a7a5c;font-style:italic}
.pj{font-size:14px;color:#e8d9b8;font-style:italic;padding:10px 0;margin-bottom:10px;border-top:1px solid #2a2621;border-bottom:1px solid #2a2621}
.pdb{font-size:12.5px;color:#a89a7f;line-height:1.6;margin-bottom:4px}
.psh{font-size:9px;letter-spacing:0.3em;color:#c9a961;margin-bottom:6px;margin-top:12px}
.pt{font-size:12.5px;color:#d4c5a9;line-height:1.6;margin-bottom:3px}
.ptt{font-size:12.5px;color:#a89a7f;line-height:1.6;font-style:italic}
.ld{background:#17150f;border:1px solid #2a2621;padding:12px 14px;margin-bottom:8px}
.ldh{font-size:11px;letter-spacing:0.25em;color:#c9a961;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #2a2621}
.lr{font-size:13px;color:#d4c5a9;line-height:1.8}
.wc{background:#17150f;border:1px solid #2a2621;padding:12px 14px;margin-bottom:8px}
.wh{font-size:11px;letter-spacing:0.25em;color:#6b8cae;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #2a2621}
.wd{font-size:12.5px;color:#d4c5a9;line-height:1.6}
textarea{width:100%;min-height:180px;background:#17150f;border:1px solid #3a3530;color:#d4c5a9;padding:14px;font-family:inherit;font-size:14px;line-height:1.7;resize:vertical;outline:none;font-style:italic}
.ft{text-align:center;padding-top:20px;border-top:1px solid #2a2621;margin-top:30px}
.fb{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.fbt{background:transparent;border:1px solid #3a3530;color:#6d6553;padding:7px 14px;font-family:inherit;font-size:10px;letter-spacing:0.25em;cursor:pointer;text-transform:uppercase}
.mt{margin-top:16px;font-size:11px;color:#4a4438;font-style:italic}
</style>
</head>
<body>
<div class="saved" id="sv">saved</div>
<div class="root">
<div class="header">
<div class="title">The 90-Day Campaign</div>
<div class="subtitle">a character sheet for the rebuild</div>
</div>
<div class="tabs" id="tb"></div>
<div id="ct"></div>
<div class="ft">
<div class="fb">
<button class="fbt" onclick="xp()">Export</button>
<button class="fbt" onclick="rs()">Reset</button>
</div>
<div class="mt">no zero days</div>
</div>
</div>
<script>
const TD=90,SK="rpgv2";
const PI=[{i:"body",l:"Body",c:"#c87941"},{i:"mind",l:"Mind",c:"#6b8cae"},{i:"craft",l:"Craft",c:"#9b7bb8"},{i:"money",l:"Coin",c:"#c9a961"},{i:"spirit",l:"Spirit",c:"#a87fb8"},{i:"kin",l:"Kin",c:"#7fa87f"}];
const DQ=[{i:"body",l:"Train the day's block + protect recovery",p:"body",x:15},{i:"mind",l:"Read 20 min (includes speed reading drills)",p:"mind",x:10},{i:"craft",l:"Touch the craft",p:"craft",x:10},{i:"money",l:"Log the day's spending",p:"money",x:5},{i:"spirit",l:"10 min stillness + intention",p:"spirit",x:10},{i:"kin",l:"One intentional connection",p:"kin",x:10},{i:"journal",l:"5 min night journal",p:"spirit",x:5},{i:"clean",l:"No PMO \u2014 hold the line",p:"spirit",x:15}];
const MX=DQ.reduce((s,q)=>s+q.x,0);
const TB=[{i:"sheet",l:"Sheet"},{i:"quests",l:"Quests"},{i:"phases",l:"Phases"},{i:"body",l:"Training"},{i:"mind",l:"Reading"},{i:"log",l:"Journal"}];
function gp(d){if(d<=30)return{n:"Foundation",u:1,c:"#c9a961",d:"Prove you can show up"};if(d<=60)return{n:"Load",u:2,c:"#c87941",d:"Prove you can show up under weight"};return{n:"Command",u:3,c:"#9b3a4a",d:"Prove you can lead your own life"}}
function gl(x){return Math.floor(x/100)+1}
function gpr(x){return x%100}
let S={days:{},cd:1,nt:"",tb:"sheet"};
function ld(){try{const r=localStorage.getItem(SK);if(r){const p=JSON.parse(r);S.days=p.days||{};S.cd=p.cd||1;S.nt=p.nt||""}}catch(e){}}
let st;
function sv(){try{localStorage.setItem(SK,JSON.stringify({days:S.days,cd:S.cd,nt:S.nt}));const e=document.getElementById("sv");e.classList.add("show");clearTimeout(st);st=setTimeout(()=>e.classList.remove("show"),1200)}catch(e){alert("Save error: "+e.message)}}
function dc(d){const x=S.days[d];if(!x)return false;return DQ.every(q=>x[q.i])}
function dx(d){const x=S.days[d];if(!x)return 0;return DQ.filter(q=>x[q.i]).reduce((s,q)=>s+q.x,0)}
function tx(){let t=0;for(let d=1;d<=TD;d++)t+=dx(d);return t}
function cs(){let s=0;for(let d=S.cd;d>=1;d--){if(dc(d))s++;else break}return s}
function ks(){let s=0;for(let d=S.cd;d>=1;d--){if(S.days[d]&&S.days[d].clean)s++;else break}return s}
function qc(){let t=0;for(let d=1;d<=TD;d++){const x=S.days[d]||{};t+=DQ.filter(q=>x[q.i]).length}return t}
function rt(){rtb();const c=document.getElementById("ct");if(S.tb==="sheet")c.innerHTML=rsh();else if(S.tb==="quests")c.innerHTML=rq();else if(S.tb==="phases")c.innerHTML=rph();else if(S.tb==="body")c.innerHTML=rtr();else if(S.tb==="mind")c.innerHTML=rrd();else if(S.tb==="log")c.innerHTML=rjl();ah()}
function rtb(){const t=document.getElementById("tb");t.innerHTML=TB.map(x=>`<button class="tab ${S.tb===x.i?'active':''}" data-t="${x.i}">${x.l}</button>`).join("");t.querySelectorAll(".tab").forEach(e=>{e.onclick=()=>{S.tb=e.dataset.t;rt()}})}
function rsh(){const d=S.cd,p=gp(d),l=gl(tx()),pr=gpr(tx()),t=S.days[d]||{},xt=dx(d);
return `<div class="banner"><div class="lv"><div class="lv-lbl">LVL</div><div class="lv-n">${l}</div></div><div class="bm"><div class="ph-lbl" style="color:${p.c}">PHASE ${p.u} \u00b7 ${p.n.toUpperCase()}</div><div class="ph-d">${p.d}</div><div class="xpb"><div style="width:${pr}%;height:100%;background:${p.c}"></div></div></div></div>
<div class="dn"><button class="dnb" id="pd" ${d===1?'disabled':''}>\u2039</button><div class="dnc"><div class="dn-lbl">DAY</div><div class="dn-n">${d} <span class="dn-t">/ ${TD}</span></div></div><button class="dnb" id="nd" ${d===TD?'disabled':''}>\u203a</button></div>
<div class="stats"><div class="stat"><div class="stat-v" style="color:#c87941">${cs()}</div><div class="stat-l">STREAK</div></div><div class="stat"><div class="stat-v" style="color:#7fa87f">${ks()}</div><div class="stat-l">CLEAN</div></div><div class="stat"><div class="stat-v" style="color:#c9a961">${tx()}</div><div class="stat-l">XP</div></div><div class="stat"><div class="stat-v" style="color:#6b8cae">${qc()}</div><div class="stat-l">DONE</div></div></div>
<div class="sec"><div class="sh"><div class="st">TODAY'S QUESTS</div><div class="sm">${xt} / ${MX} XP</div></div><div class="ql">${DQ.map(q=>{const pi=PI.find(x=>x.i===q.p),dn=t[q.i];return `<button class="qr ${dn?'done':''}" data-q="${q.i}" style="${dn?`border-color:${pi.c}66`:''}"><div class="qc" style="${dn?`background:${pi.c};border-color:${pi.c}`:''}"><span class="qc-chk">\u2713</span></div><div class="ql-lbl">${q.l}</div><div class="qxp" style="${dn?`color:${pi.c}`:''}">+${q.x}</div></button>`}).join("")}</div></div>
<div class="sec"><div class="sh"><div class="st">CAMPAIGN MAP</div></div><div class="dg">${Array.from({length:TD},(_,i)=>i+1).map(n=>{const cm=dc(n),xn=dx(n),pa=xn>0&&!cm,cu=n===d,pp=gp(n);const cl=['dc'];if(cu)cl.push('cur');if(cm)cl.push('cmp');else if(pa)cl.push('par');return `<button class="${cl.join(' ')}" data-d="${n}" style="${cm?`background:${pp.c}`:''}">${n}</button>`}).join("")}</div><div class="lg"><i><span style="background:#c9a961"></span>Foundation</i><i><span style="background:#c87941"></span>Load</i><i><span style="background:#9b3a4a"></span>Command</i></div></div>`}
function rq(){const qd=[{p:"body",l:"Train the day's block + protect recovery",d:"Do what today's program calls for \u2014 no freestyling, no skipping. Protect the recovery floor: 7+ hours sleep, protein hit, water in, no training through injury signals."},{p:"mind",l:"Read 20 min (includes speed reading drills)",d:"A real book. 20 minutes, phone in another room. Speed reading drills happen inside this block \u2014 pacer, chunking, subvocalization work."},{p:"craft",l:"Touch the craft",d:"One concrete action that moves content forward: script a hook, edit a clip, write out a reel idea fully. Thinking doesn't count. Output does."},{p:"money",l:"Log the day's spending",d:"Before bed, every dollar that left your account. Coffee, gas, subscriptions, everything. No judgment, no categories \u2014 just the log."},{p:"spirit",l:"10 min stillness + intention",d:"Two halves. Stillness: prayer, meditation, breath, silence. Intention: the one thing that matters today, and who you want to be while doing it."},{p:"kin",l:"One intentional connection",d:"Son days: phone down, fully in the room, one real moment. Non-son days: a call, a voice note, a real conversation. Not 'hey' texts."},{p:"spirit",l:"5 min night journal",d:"Three lines minimum: what I set out to do, what actually happened, what I'm taking into tomorrow. On urge days, add a fourth."},{p:"spirit",l:"No PMO \u2014 hold the line",d:"Zero. Not moderated. The streak is the streak. If broken, log it honestly and restart day 1. No shame spiral \u2014 just data and back in the fight."}];
return `<div class="ti"><div class="tit">THE DAILY QUESTS</div><div class="tid">Eight things. Every day. Every day type. Hit all eight = 80 XP, day complete.</div></div><div class="sec">${qd.map(q=>{const p=PI.find(x=>x.i===q.p);return `<div class="qd"><div class="qdh" style="border-color:${p.c}55"><div class="qdp" style="color:${p.c}">${p.l.toUpperCase()}</div></div><div class="qdt">${q.l}</div><div class="qdd">${q.d}</div></div>`}).join("")}</div>`}
function rph(){const ph=[{u:1,n:"FOUNDATION",d:"Days 1\u201330",c:"#c9a961",j:"Become someone who doesn't negotiate with himself.",x:"About proving the daily stack happens. The eight non-negotiables are the entire game. Everything else is bonus.",t:["Content: 2 reels/week, shipped","Body: lock in the program as written","Mind: one book, speed-reading drills","Money: logging only, no budget yet","Spirit: install the 10-min block daily"],tr:"Boredom. When it hits, you're doing it right.",r:"Day 30: hit the stack 25+ out of 30 days? Earn Phase 2."},{u:2,n:"LOAD",d:"Days 31\u201360",c:"#c87941",j:"Raise the floor without breaking the foundation.",x:"Daily stack on autopilot. Add load without letting the floor crack.",t:["Content: 3 reels/week + one longer piece","Body: progressive overload tracked","Mind: day 30 retest, notes system live","Money: budget from Phase 1 data","Spirit: add one 30\u201345 min deeper session/week"],tr:"Plateaus. Visible results lag invisible progress.",r:"Day 60: did load go up AND the floor hold? Both."},{u:3,n:"COMMAND",d:"Days 61\u201390",c:"#9b3a4a",j:"Stop performing discipline. Start operating from it.",x:"The stack is who you are now. Phase 3 is where identity shift locks in.",t:["Content: 4 reels/week + flagship piece","Body: one genuinely hard session weekly","Mind: teach what you've learned","Money: 6-month goal with weekly save target","Spirit: deepen","Kin: do something meaningful for someone else"],tr:"Coasting. Finish the way you started.",r:"Day 90: a reckoning. Decide what day 91 looks like."}];const a=gp(S.cd);
return `<div class="ti"><div class="tit">THE THREE PHASES</div><div class="tid">Ninety days, three acts. Each shifts focus, load, and identity.</div><div class="tis" style="color:${a.c}">Currently: Phase ${a.u} \u2014 ${a.n}</div></div>${ph.map(p=>`<div class="pc" style="border-left:3px solid ${p.c};opacity:${p.u===a.u?1:0.78}"><div class="pch"><div><div class="pcl" style="color:${p.c}">PHASE ${p.u}</div><div class="pcn">${p.n}</div></div><div class="pcd">${p.d}</div></div><div class="pj">"${p.j}"</div><div class="pdb">${p.x}</div><div class="psh">TARGETS</div>${p.t.map(t=>`<div class="pt">\u00b7 ${t}</div>`).join("")}<div class="psh">THE TRAP</div><div class="ptt">${p.tr}</div><div class="psh">CHECKPOINT</div><div class="ptt">${p.r}</div></div>`).join("")}`}
function rtr(){const d=[{n:"DAY 1 \u2014 UPPER (STRENGTH)",l:["Barbell bench press \u2014 4\u00d75\u20136","Weighted pull-ups \u2014 4\u00d76\u20138","Standing OHP \u2014 3\u00d76\u20138","Barbell row \u2014 3\u00d78","Incline DB curl \u2014 3\u00d710","Skullcrushers \u2014 3\u00d710","Hanging leg raise \u2014 3\u00d712"]},{n:"DAY 2 \u2014 LOWER (STRENGTH)",l:["Back squat \u2014 4\u00d75\u20136","RDL \u2014 3\u00d78","Walking lunges \u2014 3\u00d710/leg","Leg curl \u2014 3\u00d712","Standing calf \u2014 4\u00d710\u201312","Plank \u2014 3\u00d7 failure"]},{n:"DAY 3 \u2014 REST / CONDITIONING",l:["20\u201330 min zone 2 cardio","OR mobility","OR full rest"]},{n:"DAY 4 \u2014 PUSH (HYPERTROPHY)",l:["Incline DB press \u2014 4\u00d78\u201310","Seated DB press \u2014 3\u00d710","Cable fly \u2014 3\u00d712","Lateral raise \u2014 4\u00d712\u201315","Tricep pushdown \u2014 3\u00d712","Overhead extension \u2014 3\u00d712"]},{n:"DAY 5 \u2014 PULL (HYPERTROPHY)",l:["Lat pulldown \u2014 4\u00d710","Chest-supported row \u2014 4\u00d710","Face pull \u2014 3\u00d715","Rear delt fly \u2014 3\u00d715","Hammer curl \u2014 3\u00d710","Cable curl \u2014 3\u00d712"]},{n:"DAY 6 \u2014 LEGS (OPTIONAL)",l:["Bulgarian split squat \u2014 3\u00d710/leg","Leg press \u2014 4\u00d712","Leg extension \u2014 3\u00d715","Seated leg curl \u2014 3\u00d715","Seated calf \u2014 4\u00d715","Cable crunch \u2014 3\u00d715"]},{n:"DAY 7 \u2014 FULL REST",l:["Sleep. Eat. Don't lift."]}];
return `<div class="ti"><div class="tit">THE TRAINING PROGRAM</div><div class="tid">U/L/P/P/L split for body recomp. Heavy enough to preserve strength, volume for growth.</div></div><div class="ic"><div class="ict">PROGRESSION</div><div class="icd">Double progression. Hit top of range for all sets \u2192 add smallest jump next session. Stall 3+ sessions \u2192 deload 10%.</div></div><div class="ic"><div class="ict">EFFORT</div><div class="icd">Leave 1\u20132 reps in the tank most sets. Save failure for last set of isolation lifts. Compounds never to failure.</div></div><div class="ic"><div class="ict">DELOADS</div><div class="icd">Week 6 and Week 12. ~60% weight, half the sets. Skip these and you end injured, not transformed.</div></div><div class="sec"><div class="sh"><div class="st">WEEKLY SPLIT</div></div>${d.map(x=>`<div class="ld"><div class="ldh">${x.n}</div>${x.l.map(y=>`<div class="lr">${y}</div>`).join("")}</div>`).join("")}</div><div class="ic"><div class="ict">CONDITIONING</div><div class="icd">2 slots/week. One steady-state 30\u201340 min zone 2. One interval 15\u201320 min.</div></div><div class="ic"><div class="ict">RECOVERY FLOOR</div><div class="icd">7+ hrs sleep. ~1g protein per lb goal bodyweight. Half bodyweight in oz water minimum. 7000+ steps.</div></div>`}
