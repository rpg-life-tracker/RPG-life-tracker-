<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Campaign">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f0e0c">
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' fill='%230f0e0c'/><text x='50%25' y='58%25' font-family='Georgia,serif' font-size='100' text-anchor='middle' fill='%23c9a961' font-style='italic'>90</text></svg>">
<title>The 90-Day Campaign</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  background: #0f0e0c;
  color: #d4c5a9;
  font-family: Georgia, 'Times New Roman', serif;
  min-height: 100vh;
  overscroll-behavior: none;
  -webkit-font-smoothing: antialiased;
}
body {
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  background-image: radial-gradient(ellipse at top, rgba(201, 169, 97, 0.06), transparent 60%);
}
.root { padding: 20px 14px 60px; max-width: 720px; margin: 0 auto; }

/* Header */
.header { text-align: center; padding-bottom: 20px; border-bottom: 1px solid #3a3530; margin-bottom: 20px; }
.crest {
width: 38px; height: 38px; margin: 0 auto 10px;
border: 1px solid #c9a961; background: #1a1815;
display: flex; align-items: center; justify-content: center;
transform: rotate(45deg);
}
.crest svg { transform: rotate(-45deg); }
.title { font-size: 24px; color: #e8d9b8; font-style: italic; letter-spacing: 0.02em; margin-bottom: 4px; }
.subtitle { font-size: 10px; color: #8a7a5c; letter-spacing: 0.3em; text-transform: uppercase; }

/* Save indicator */
.save-indicator {
position: fixed; top: calc(env(safe-area-inset-top) + 8px); right: 12px;
font-size: 10px; color: #7fa87f; letter-spacing: 0.2em; text-transform: uppercase;
opacity: 0; transition: opacity 0.3s; font-style: italic;
pointer-events: none; z-index: 100;
}
.save-indicator.show { opacity: 1; }

/* Tabs */
.tabs {
display: flex; gap: 4px; margin-bottom: 24px;
overflow-x: auto; border-bottom: 1px solid #2a2621;
-ms-overflow-style: none; scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
padding: 10px 12px; background: transparent; border: none;
border-bottom: 2px solid transparent;
color: #6d6553; font-family: inherit; font-size: 11px;
letter-spacing: 0.2em; text-transform: uppercase;
cursor: pointer; white-space: nowrap;
}
.tab.active { color: #e8d9b8; border-bottom: 2px solid #c9a961; }

/* Banner */
.banner {
display: flex; gap: 16px; margin-bottom: 20px;
padding: 16px 18px; background: #17150f;
border: 1px solid #3a3530; align-items: center;
}
.level-box { text-align: center; border-right: 1px solid #3a3530; padding-right: 16px; flex-shrink: 0; }
.level-label { font-size: 9px; letter-spacing: 0.3em; color: #8a7a5c; }
.level-num { font-size: 28px; color: #e8d9b8; line-height: 1; }
.banner-mid { flex: 1; min-width: 0; }
.phase-label { font-size: 10px; letter-spacing: 0.25em; margin-bottom: 4px; }
.phase-desc-small { font-size: 12px; color: #a89a7f; font-style: italic; margin-bottom: 10px; }
.xp-bar { height: 4px; background: #2a2621; border: 1px solid #3a3530; width: 100%; overflow: hidden; }
.xp-bar-fill { height: 100%; transition: width 0.3s; }

/* Day nav */
.day-nav {
display: flex; align-items: center; justify-content: space-between;
padding: 12px 16px; background: #17150f;
border: 1px solid #3a3530; margin-bottom: 20px;
}
.day-nav-btn {
background: transparent; border: 1px solid #3a3530;
color: #c9a961; padding: 6px 10px; cursor: pointer;
font-family: inherit; font-size: 14px;
}
.day-nav-btn:disabled { opacity: 0.3; }
.day-nav-center { text-align: center; flex: 1; }
.day-nav-label { font-size: 9px; letter-spacing: 0.3em; color: #8a7a5c; }
.day-nav-num { font-size: 22px; color: #e8d9b8; }
.day-nav-total { font-size: 13px; color: #6d6553; }

/* Stats */
.stats { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px; margin-bottom: 24px; }
.stat { background: #17150f; border: 1px solid #3a3530; padding: 10px 6px; text-align: center; }
.stat-icon { margin-bottom: 6px; display: flex; justify-content: center; }
.stat-value { font-size: 18px; color: #e8d9b8; margin-bottom: 2px; }
.stat-label { font-size: 8px; letter-spacing: 0.2em; color: #6d6553; }

/* Sections */
.section { margin-bottom: 28px; }
.section-header {
display: flex; justify-content: space-between; align-items: baseline;
margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #2a2621;
}
.section-title { font-size: 11px; letter-spacing: 0.3em; color: #c9a961; }
.section-meta { font-size: 10px; color: #8a7a5c; font-style: italic; }

/* Quests */
.quest-list { display: flex; flex-direction: column; gap: 4px; }
.quest-row {
width: 100%; display: flex; align-items: center; gap: 12px;
padding: 12px 14px; background: #17150f;
border: 1px solid #2a2621; cursor: pointer;
color: #d4c5a9; font-family: inherit; font-size: 14px; text-align: left;
transition: border-color 0.15s;
}
.quest-check {
width: 18px; height: 18px; border: 1.5px solid #4a4438;
display: flex; align-items: center; justify-content: center; flex-shrink: 0;
transition: all 0.15s;
}
.quest-check svg { display: none; }
.quest-row.done .quest-check svg { display: block; }
.quest-label { flex: 1; font-size: 13px; line-height: 1.3; }
.quest-row.done .quest-label { opacity: 0.7; text-decoration: line-through; }
.quest-xp { font-size: 10px; letter-spacing: 0.1em; font-weight: 600; flex-shrink: 0; color: #6d6553; }
.quest-icon { flex-shrink: 0; opacity: 0.65; }
.quest-row.done .quest-icon { opacity: 1; }

/* Day grid */
.day-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 3px; margin-bottom: 12px; }
.day-cell {
aspect-ratio: 1; font-size: 10px; font-family: inherit;
cursor: pointer; padding: 0; border: 1px solid #2a2621;
background: #17150f; color: #8a7a5c;
}
.day-cell.current { border: 1.5px solid #e8d9b8; }
.day-cell.complete { color: #0f0e0c; font-weight: 700; }
.day-cell.partial { background: #28241e; }

.legend { display: flex; gap: 14px; font-size: 9px; color: #6d6553; letter-spacing: 0.15em; text-transform: uppercase; }
.legend-item { display: flex; align-items: center; gap: 5px; }
.legend-dot { width: 7px; height: 7px; display: inline-block; }

/* Pillars */
.pillar-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
.pillar-card {
background: #17150f; border: 1px solid #2a2621;
padding: 10px 8px; display: flex; flex-direction: column;
align-items: center; gap: 5px;
}
.pillar-label { font-size: 9px; letter-spacing: 0.2em; color: #a89a7f; }
.pillar-bar { width: 100%; height: 3px; background: #2a2621; }
.pillar-bar-fill { height: 100%; }
.pillar-count { font-size: 11px; color: #d4c5a9; }

/* Tab intros & info cards */
.tab-intro { padding: 16px 0 20px; border-bottom: 1px solid #2a2621; margin-bottom: 24px; }
.tab-intro-title { font-size: 14px; letter-spacing: 0.3em; color: #c9a961; margin-bottom: 10px; }
.tab-intro-desc { font-size: 13px; color: #a89a7f; line-height: 1.6; font-style: italic; }
.tab-intro-sub { margin-top: 10px; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; }

.info-card {
background: #17150f; border: 1px solid #2a2621;
border-left: 2px solid #c9a961; padding: 12px 14px; margin-bottom: 10px;
}
.info-card-title { font-size: 10px; letter-spacing: 0.25em; color: #c9a961; margin-bottom: 6px; }
.info-card-desc { font-size: 13px; color: #d4c5a9; line-height: 1.6; }

/* Quest details */
.quest-detail-card { background: #17150f; border: 1px solid #2a2621; padding: 14px 16px; margin-bottom: 10px; }
.quest-detail-head {
display: flex; align-items: center; gap: 8px;
padding-bottom: 8px; margin-bottom: 8px; border-bottom: 1px solid;
}
.quest-detail-pillar { font-size: 10px; letter-spacing: 0.25em; }
.quest-detail-title { font-size: 14px; color: #e8d9b8; margin-bottom: 8px; font-style: italic; }
.quest-detail-desc { font-size: 12.5px; color: #a89a7f; line-height: 1.6; }

.pillar-desc-card { background: #17150f; border: 1px solid #2a2621; padding: 12px 14px; margin-bottom: 10px; }
.pillar-desc-head { display: flex; align-items: center; gap: 8px; font-size: 11px; letter-spacing: 0.25em; margin-bottom: 6px; }
.pillar-desc-text { font-size: 12.5px; color: #a89a7f; line-height: 1.6; }

/* Phase cards */
.phase-card { background: #17150f; border: 1px solid #2a2621; padding: 16px 18px; margin-bottom: 14px; }
.phase-card-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
.phase-card-label { font-size: 10px; letter-spacing: 0.3em; }
.phase-card-name { font-size: 20px; color: #e8d9b8; letter-spacing: 0.05em; }
.phase-card-days { font-size: 11px; color: #8a7a5c; font-style: italic; }
.phase-job {
font-size: 14px; color: #e8d9b8; font-style: italic;
padding: 10px 0; margin-bottom: 10px;
border-top: 1px solid #2a2621; border-bottom: 1px solid #2a2621;
}
.phase-desc-block { font-size: 12.5px; color: #a89a7f; line-height: 1.6; margin-bottom: 4px; }
.phase-subhead { font-size: 9px; letter-spacing: 0.3em; color: #c9a961; margin-bottom: 6px; }
.phase-target { font-size: 12.5px; color: #d4c5a9; line-height: 1.6; margin-bottom: 3px; }
.phase-trap-text { font-size: 12.5px; color: #a89a7f; line-height: 1.6; font-style: italic; }
.phase-section { margin-top: 12px; }

/* Training */
.lift-day { background: #17150f; border: 1px solid #2a2621; padding: 12px 14px; margin-bottom: 8px; }
.lift-day-head { font-size: 11px; letter-spacing: 0.25em; color: #c9a961; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid #2a2621; }
.lift-row { font-size: 13px; color: #d4c5a9; line-height: 1.8; }

/* Reading weeks */
.week-card { background: #17150f; border: 1px solid #2a2621; padding: 12px 14px; margin-bottom: 8px; }
.week-head { font-size: 11px; letter-spacing: 0.25em; color: #6b8cae; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid #2a2621; }
.week-desc { font-size: 12.5px; color: #d4c5a9; line-height: 1.6; }

/* Textarea */
textarea {
width: 100%; min-height: 180px;
background: #17150f; border: 1px solid #3a3530;
color: #d4c5a9; padding: 14px;
font-family: inherit; font-size: 14px; line-height: 1.7;
resize: vertical; outline: none; font-style: italic;
}

/* Footer */
.footer { text-align: center; padding-top: 20px; border-top: 1px solid #2a2621; margin-top: 30px; }
.footer-btns { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
.footer-btn {
background: transparent; border: 1px solid #3a3530;
color: #6d6553; padding: 7px 14px;
font-family: inherit; font-size: 10px; letter-spacing: 0.25em;
cursor: pointer; text-transform: uppercase;
}
.motto { margin-top: 16px; font-size: 11px; color: #4a4438; font-style: italic; }

.hidden { display: none; }
</style>

</head>
<body>

<div class="save-indicator" id="saveIndicator">saved</div>

<div class="root">

  <div class="header">
    <div class="crest">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#c9a961" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="14.5 17.5 3 6 3 3 6 3 17.5 14.5"></polyline><line x1="13" y1="19" x2="19" y2="13"></line><line x1="16" y1="16" x2="20" y2="20"></line><line x1="19" y1="21" x2="21" y2="19"></line></svg>
    </div>
    <div class="title">The 90-Day Campaign</div>
    <div class="subtitle">a character sheet for the rebuild</div>
  </div>

  <div class="tabs" id="tabs"></div>
  <div id="content"></div>

  <div class="footer">
    <div class="footer-btns">
      <button class="footer-btn" onclick="exportData()">Export</button>
      <button class="footer-btn" onclick="resetAll()">Reset Campaign</button>
    </div>
    <div class="motto">no zero days</div>
  </div>
</div>

<script>
// ============ CONFIG ============
const TOTAL_DAYS = 90;
const STORAGE_KEY = "rpg-tracker-v1";

const PILLARS = [
  { id: "body", label: "Body", color: "#c87941", icon: "dumbbell" },
  { id: "mind", label: "Mind", color: "#6b8cae", icon: "book" },
  { id: "craft", label: "Craft", color: "#9b7bb8", icon: "swords" },
  { id: "money", label: "Coin", color: "#c9a961", icon: "coins" },
  { id: "spirit", label: "Spirit", color: "#a87fb8", icon: "heart" },
  { id: "kin", label: "Kin", color: "#7fa87f", icon: "users" },
];

const DAILY_QUESTS = [
  { id: "body", label: "Train the day's block + protect recovery", pillar: "body", xp: 15 },
  { id: "mind", label: "Read 20 min (includes speed reading drills)", pillar: "mind", xp: 10 },
  { id: "craft", label: "Touch the craft", pillar: "craft", xp: 10 },
  { id: "money", label: "Log the day's spending", pillar: "money", xp: 5 },
  { id: "spirit", label: "10 min stillness + intention", pillar: "spirit", xp: 10 },
  { id: "kin", label: "One intentional connection", pillar: "kin", xp: 10 },
  { id: "journal", label: "5 min night journal", pillar: "spirit", xp: 5 },
  { id: "clean", label: "No PMO — hold the line", pillar: "spirit", xp: 15 },
];

const DAILY_MAX_XP = DAILY_QUESTS.reduce((s, q) => s + q.xp, 0);

const TABS = [
  { id: "sheet", label: "Sheet" },
  { id: "quests", label: "Quests" },
  { id: "phases", label: "Phases" },
  { id: "body", label: "Training" },
  { id: "mind", label: "Reading" },
  { id: "log", label: "Journal" },
];

function getPhase(day) {
  if (day <= 30) return { name: "Foundation", num: 1, color: "#c9a961", desc: "Prove you can show up" };
  if (day <= 60) return { name: "Load", num: 2, color: "#c87941", desc: "Prove you can show up under weight" };
  return { name: "Command", num: 3, color: "#9b3a4a", desc: "Prove you can lead your own life" };
}

function getLevel(xp) { return Math.floor(xp / 100) + 1; }
function getLevelProgress(xp) { return xp % 100; }

// ============ STATE + STORAGE ============
let state = { days: {}, currentDay: 1, notes: "", tab: "sheet" };

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const p = JSON.parse(raw);
      state.days = p.days || {};
      state.currentDay = p.currentDay || 1;
      state.notes = p.notes || "";
    }
  } catch (e) {}
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      days: state.days, currentDay: state.currentDay, notes: state.notes
    }));
    showSaved();
  } catch (e) {
    alert("Storage error: " + e.message);
  }
}

let saveTimer;
function showSaved() {
  const el = document.getElementById("saveIndicator");
  el.classList.add("show");
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => el.classList.remove("show"), 1200);
}

// ============ ICONS ============
const ICONS = {
  dumbbell: '<path d="m6.5 6.5 11 11"></path><path d="m21 21-1-1"></path><path d="m3 3 1 1"></path><path d="m18 22 4-4"></path><path d="m2 6 4-4"></path><path d="m3 10 7-7"></path><path d="m14 21 7-7"></path>',
  book: '<path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"></path>',
  swords: '<polyline points="14.5 17.5 3 6 3 3 6 3 17.5 14.5"></polyline><line x1="13" y1="19" x2="19" y2="13"></line><line x1="16" y1="16" x2="20" y2="20"></line><line x1="19" y1="21" x2="21" y2="19"></line><polyline points="14.5 6.5 18 3 21 3 21 6 17.5 9.5"></polyline><line x1="5" y1="14" x2="9" y2="18"></line><line x1="7" y1="17" x2="4" y2="20"></line><line x1="3" y1="19" x2="5" y2="21"></line>',
  coins: '<circle cx="8" cy="8" r="6"></circle><path d="M18.09 10.37A6 6 0 1 1 10.34 18"></path><path d="M7 6h1v4"></path><path d="m16.71 13.88.7.71-2.82 2.82"></path>',
  heart: '<path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"></path>',
  users: '<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path>',
  flame: '<path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"></path>',
  shield: '<path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"></path>',
  trending: '<polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline><polyline points="16 7 22 7 22 13"></polyline>',
  check: '<polyline points="20 6 9 17 4 12"></polyline>',
  left: '<polyline points="15 18 9 12 15 6"></polyline>',
  right: '<polyline points="9 18 15 12 9 6"></polyline>',
};

function icon(name, size = 14, color = "currentColor", strokeWidth = 2) {
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="${strokeWidth}" stroke-linecap="round" stroke-linejoin="round">${ICONS[name] || ''}</svg>`;
}

// ============ RENDER ============
function render() {
  renderTabs();
  const c = document.getElementById("content");
  if (state.tab === "sheet") c.innerHTML = renderSheet();
  else if (state.tab === "quests") c.innerHTML = renderQuests();
  else if (state.tab === "phases") c.innerHTML = renderPhases();
  else if (state.tab === "body") c.innerHTML = renderTraining();
  else if (state.tab === "mind") c.innerHTML = renderReading();
  else if (state.tab === "log") c.innerHTML = renderJournal();
  attachHandlers();
}

function renderTabs() {
  const t = document.getElementById("tabs");
  t.innerHTML = TABS.map(tab =>
    `<button class="tab ${state.tab === tab.id ? 'active' : ''}" data-tab="${tab.id}">${tab.label}</button>`
  ).join("");
  t.querySelectorAll(".tab").forEach(el => {
    el.onclick = () => { state.tab = el.dataset.tab; render(); };
  });
}

// Stat calculators
function dayComplete(d) {
  const dd = state.days[d];
  if (!dd) return false;
  return DAILY_QUESTS.every(q => dd[q.id]);
}
function dayXp(d) {
  const dd = state.days[d];
  if (!dd) return 0;
  return DAILY_QUESTS.filter(q => dd[q.id]).reduce((s, q) => s + q.xp, 0);
}
function totalXp() {
  let t = 0;
  for (let d = 1; d <= TOTAL_DAYS; d++) t += dayXp(d);
  return t;
}
function currentStreak() {
  let s = 0;
  for (let d = state.currentDay; d >= 1; d--) {
    if (dayComplete(d)) s++; else break;
  }
  return s;
}
function cleanStreak() {
  let s = 0;
  for (let d = state.currentDay; d >= 1; d--) {
    if (state.days[d]?.clean) s++; else break;
  }
  return s;
}
function questsCompleted() {
  let t = 0;
  for (let d = 1; d <= TOTAL_DAYS; d++) {
    const dd = state.days[d] || {};
    t += DAILY_QUESTS.filter(q => dd[q.id]).length;
  }
  return t;
}

// ============ SHEET ============
function renderSheet() {
  const day = state.currentDay;
  const phase = getPhase(day);
  const level = getLevel(totalXp());
  const progress = getLevelProgress(totalXp());
  const today = state.days[day] || {};
  const xpToday = dayXp(day);

  return `
    <div class="banner">
      <div class="level-box">
        <div class="level-label">LVL</div>
        <div class="level-num">${level}</div>
      </div>
      <div class="banner-mid">
        <div class="phase-label" style="color:${phase.color}">PHASE ${phase.num} · ${phase.name.toUpperCase()}</div>
        <div class="phase-desc-small">${phase.desc}</div>
        <div class="xp-bar"><div class="xp-bar-fill" style="width:${progress}%; background:${phase.color}"></div></div>
      </div>
    </div>

    <div class="day-nav">
      <button class="day-nav-btn" id="prevDay" ${day === 1 ? 'disabled' : ''}>${icon('left', 16, '#c9a961')}</button>
      <div class="day-nav-center">

    </div>

// ============ HANDLERS ============
function attachHandlers() {
// Quest toggles
document.querySelectorAll(”.quest-row”).forEach(el => {
el.onclick = () => {
const questId = el.dataset.quest;
if (!state.days[state.currentDay]) state.days[state.currentDay] = {};
state.days[state.currentDay][questId] = !state.days[state.currentDay][questId];
saveState();
render();
};
});

// Day navigation
const prev = document.getElementById(“prevDay”);
if (prev) prev.onclick = () => {
if (state.currentDay > 1) { state.currentDay–; saveState(); render(); }
};
const next = document.getElementById(“nextDay”);
if (next) next.onclick = () => {
if (state.currentDay < TOTAL_DAYS) { state.currentDay++; saveState(); render(); }
};

// Day grid jump
document.querySelectorAll(”.day-cell”).forEach(el => {
el.onclick = () => {
state.currentDay = parseInt(el.dataset.day);
saveState();
render();
};
});

// Journal textarea
const journal = document.getElementById(“journal”);
if (journal) {
let timer;
journal.oninput = (e) => {
state.notes = e.target.value;
clearTimeout(timer);
timer = setTimeout(() => saveState(), 400);
};
}
}

// ============ ACTIONS ============
function exportData() {
const dump = JSON.stringify({
days: state.days,
currentDay: state.currentDay,
notes: state.notes,
exportedAt: new Date().toISOString(),
}, null, 2);

try {
navigator.clipboard.writeText(dump);
alert(“Campaign data copied to clipboard. Paste it somewhere safe as backup.”);
} catch (e) {
prompt(“Copy this text as your backup:”, dump);
}
}

function resetAll() {
if (!confirm(“Reset all progress? Cannot be undone.”)) return;
state = { days: {}, currentDay: 1, notes: “”, tab: “sheet” };
try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
render();
}

// ============ BOOT ============
loadState();
render();
</script>
